services:
  db:
    image: postgres:16-alpine
    container_name: interview_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interview}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interview} -d ${POSTGRES_DB:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: interview_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/code/uploads

volumes:
  pgdata:
