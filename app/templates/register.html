{% extends "base.html" %}
{% block title %}Register — {{ app_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="mb-3 text-center">Create your account</h3>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input type="text" name="full_name" class="form-control" minlength="2" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" minlength="8" required>
            <div class="form-text">At least 8 characters.</div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <p class="text-center mt-3 mb-0 small">
          Already registered? <a href="/login">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target).entries());
  const res = await api('/api/auth/register', 'POST', body);
  if (res.ok) {
    const login = await api('/api/auth/login', 'POST', {email: body.email, password: body.password});
    if (login.ok) window.location = '/dashboard';
  } else {
    showAlert(res.data.detail || 'Registration failed', 'danger');
  }
});
</script>
{% endblock %}
